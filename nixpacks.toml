providers = ["python"]

[variables]
NIXPACKS_PYTHON_VERSION = "3.12"

[phases.setup]
nixPkgs = ["python312", "python312Packages.pip", "python312Packages.setuptools", "python312Packages.wheel"]

[phases.install]
cmds = [
	"python -m pip install --upgrade pip setuptools wheel",
	"python -m pip install -r requirements.txt"
]

[start]
cmd = "python main.py --host 0.0.0.0"